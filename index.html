<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>starbucks</title>
    <link rel="shortcut icon" href="./starbucks.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<header>
    <nav>
        <div class="header-contenedor">
        <img class="logo" src="./starbucks.png" alt="logo de starbucks">
        <ul class="header-left">
            <li><a href="https://www.starbucks.com/menu" target="_blank" rel="noopener noreferrer">MENU</a></li>
            <li><a href="https://rewards.starbucks.mx/" target="_blank" rel="noopener noreferrer">REWARDS</a></li>
        </ul>
        <ul class="header-right">
            <li><img class="localizador" src="./location.png" alt="ping de localizacion"><a href="/store-locator" target="_blank" rel="noopener noreferrer"><b>Localizar Tienda</b></a></li>
            <li><button class="button-ingresar"><a href="https://rewards.starbucks.mx/login" target="_blank" rel="noopener noreferrer">Ingresar</a></button></li>

        </div>

<body>
    <section class="nuevas-vibes">

            <img src="https://content-prod-live.cert.starbucks.com/binary/v2/asset/137-106366.jpg" 
            alt="tomando un café">
        </div>
        <div class="contenido">
            <p class="titulo"><b>Bold new matcha menu
</b></p>
            <p>Meet the matcha edit: delicious matcha made from</p>
            <p>shade-grown green tea leaves, layered with flavors of</p>

            <a href="https://www.starbucks.com/menu/drinks/matcha"
            target="_blank" 
            rel="noopener noreferrer"
            class="btn btn-success">
            Order from the matcha menu
            </a>
        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
